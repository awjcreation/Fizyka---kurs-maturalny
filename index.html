&lt;div class=&quot;wrap&quot;&gt;
  &lt;section class=&quot;card hero&quot;&gt;

      Kurs prowadzi od podstaw: od ładunku elektrycznego, przez prawo Coulomba i pole elektryczne,
      aż do kondensatorów, energii kondensatora i prostych zadań obliczeniowych.
      W każdym module znajdziesz intuicję, krótką wizualizację, pytanie kontrolne i możliwość przejścia do ćwiczeń.

      &lt;div class=&quot;stat&quot;&gt;&lt;span class=&quot;label&quot;&gt;Aktualny moduł&lt;/span&gt;&lt;span class=&quot;value&quot; id=&quot;currentModule&quot;&gt;1&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;stat&quot;&gt;&lt;span class=&quot;label&quot;&gt;Mini-quizy zaliczone&lt;/span&gt;&lt;span class=&quot;value&quot; id=&quot;passedCount&quot;&gt;0&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;stat&quot;&gt;&lt;span class=&quot;label&quot;&gt;Postęp kursu&lt;/span&gt;&lt;span class=&quot;value&quot; id=&quot;coursePercent&quot;&gt;10%&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;progressbar&quot;&gt;&lt;div id=&quot;progressBar&quot;&gt;&lt;/div&gt;&lt;/div&gt;

    &lt;div class=&quot;controls&quot;&gt;

    &lt;/div&gt;

    &lt;div class=&quot;toc&quot;&gt;
      &lt;a href=&quot;#&quot; onclick=&quot;goToModule(0); return false;&quot;&gt;1. Ładunek elektryczny&lt;/a&gt;

      &lt;a href=&quot;#&quot; onclick=&quot;goToModule(9); return false;&quot;&gt;10. Podsumowanie i przejście do quizu&lt;/a&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;div id=&quot;materialTop&quot;&gt;&lt;/div&gt;
  &lt;section id=&quot;modules&quot;&gt;&lt;/section&gt;

  &lt;section class=&quot;card practice&quot; id=&quot;practiceSection&quot;&gt;
    &lt;h2&gt;Zadania obliczeniowe krok po kroku&lt;/h2&gt;
    &lt;p class=&quot;muted&quot;&gt;Tutaj przechodzisz przez typowe zadania z tego działu. Każdy przykład ma rozwijane etapy rozwiązania.&lt;/p&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 1. Prawo Coulomba&lt;/h3&gt;
      &lt;p&gt;Dwa ładunki: &lt;strong&gt;q₁ = 2 μC&lt;/strong&gt; i &lt;strong&gt;q₂ = 3 μC&lt;/strong&gt; znajdują się w odległości &lt;strong&gt;r = 0,20 m&lt;/strong&gt;. Oblicz wartość siły oddziaływania.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Zapisz wzór: &lt;strong&gt;F = k·|q₁q₂|/r²&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień mikroculomby: 2 μC = 2·10⁻⁶ C, 3 μC = 3·10⁻⁶ C.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; Podstaw: F = 9·10⁹ · (2·10⁻⁶ · 3·10⁻⁶) / (0,20)².&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol1&#x27;)&quot;&gt;Pokaż wynik i komentarz&lt;/button&gt;
        &lt;div id=&quot;sol1&quot; class=&quot;reveal-content&quot;&gt;
          Po obliczeniu wychodzi &lt;strong&gt;F = 1,35 N&lt;/strong&gt;. Najczęstszy błąd to brak zamiany μC na C albo zapomnienie o kwadracie odległości.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 2. Natężenie pola&lt;/h3&gt;
      &lt;p&gt;Na ładunek &lt;strong&gt;q = 5 nC&lt;/strong&gt; działa w polu siła &lt;strong&gt;F = 2·10⁻⁴ N&lt;/strong&gt;. Oblicz natężenie pola.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Użyj zależności &lt;strong&gt;E = F/q&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień 5 nC = 5·10⁻⁹ C.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; E = 2·10⁻⁴ / 5·10⁻⁹ = 4·10⁴ N/C.&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol2&#x27;)&quot;&gt;Pokaż interpretację&lt;/button&gt;
        &lt;div id=&quot;sol2&quot; class=&quot;reveal-content&quot;&gt;
          Otrzymujesz &lt;strong&gt;40 000 N/C&lt;/strong&gt;. To oznacza, że na ładunek 1 C w tym punkcie działałaby siła 40 000 N.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 3. Pole jednorodne&lt;/h3&gt;
      &lt;p&gt;Między płytami kondensatora jest napięcie &lt;strong&gt;U = 120 V&lt;/strong&gt;, a odległość między okładkami wynosi &lt;strong&gt;d = 6 mm&lt;/strong&gt;. Oblicz natężenie pola.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Wzór: &lt;strong&gt;E = U/d&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień 6 mm = 0,006 m.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; E = 120 / 0,006 = 20 000 V/m.&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol3&#x27;)&quot;&gt;Pokaż uwagę egzaminacyjną&lt;/button&gt;
        &lt;div id=&quot;sol3&quot; class=&quot;reveal-content&quot;&gt;
          W polu jednorodnym między okładkami kondensatora natężenie ma tę samą wartość w całej przestrzeni między płytami.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 4. Pojemność kondensatora&lt;/h3&gt;
      &lt;p&gt;Kondensator zgromadził ładunek &lt;strong&gt;Q = 8 μC&lt;/strong&gt; przy napięciu &lt;strong&gt;U = 4 V&lt;/strong&gt;. Oblicz jego pojemność.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Skorzystaj ze wzoru &lt;strong&gt;C = Q/U&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień 8 μC = 8·10⁻⁶ C.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; C = 8·10⁻⁶ / 4 = 2·10⁻⁶ F.&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol4&#x27;)&quot;&gt;Pokaż wynik w wygodnej jednostce&lt;/button&gt;
        &lt;div id=&quot;sol4&quot; class=&quot;reveal-content&quot;&gt;
          Wynik to &lt;strong&gt;2 μF&lt;/strong&gt;. Przy takich zadaniach warto na końcu wrócić do wygodniejszej jednostki: mikrofaradów.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 5. Energia kondensatora&lt;/h3&gt;
      &lt;p&gt;Kondensator ma pojemność &lt;strong&gt;C = 50 μF&lt;/strong&gt; i napięcie &lt;strong&gt;U = 12 V&lt;/strong&gt;. Oblicz energię zgromadzoną w kondensatorze.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Wzór: &lt;strong&gt;E = ½·C·U²&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień 50 μF = 50·10⁻⁶ F.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; E = 0,5 · 50·10⁻⁶ · 12² = 3,6·10⁻³ J.&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol5&#x27;)&quot;&gt;Pokaż sens fizyczny wyniku&lt;/button&gt;
        &lt;div id=&quot;sol5&quot; class=&quot;reveal-content&quot;&gt;
          To &lt;strong&gt;0,0036 J&lt;/strong&gt;. Wzór zawiera &lt;strong&gt;U²&lt;/strong&gt;, więc podwojenie napięcia zwiększa energię aż cztery razy.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;primary&quot; onclick=&quot;window.scrollTo({top:0,behavior:&#x27;smooth&#x27;})&quot;&gt;Wróć na górę&lt;/button&gt;
      &lt;button class=&quot;secondary&quot; onclick=&quot;hidePractice()&quot;&gt;Ukryj zadania&lt;/button&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;card summary&quot; id=&quot;summarySection&quot;&gt;
    &lt;h2&gt;Podsumowanie postępów&lt;/h2&gt;
    &lt;p id=&quot;summaryText&quot;&gt;&lt;/p&gt;
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;primary&quot; onclick=&quot;goToModule(0)&quot;&gt;Przejdź od początku&lt;/button&gt;
      &lt;button class=&quot;secondary&quot; onclick=&quot;showPractice()&quot;&gt;Przejdź do zadań&lt;/button&gt;
    &lt;/div&gt;
  &lt;/section&gt;

&lt;script&gt;
const modulesData = [
  {
    title: &quot;1. Ładunek elektryczny&quot;,
    tag: &quot;podstawy&quot;,
    body: `
      &lt;p&gt;Ładunek elektryczny to własność materii odpowiedzialna za oddziaływania elektrostatyczne. W praktyce spotykamy dwa rodzaje ładunków: &lt;strong&gt;dodatni&lt;/strong&gt; i &lt;strong&gt;ujemny&lt;/strong&gt;.&lt;/p&gt;
      &lt;div class=&quot;columns&quot;&gt;
        &lt;div class=&quot;box&quot;&gt;
          &lt;h3&gt;Najważniejsze fakty&lt;/h3&gt;
          &lt;p&gt;Ładunki jednoimienne się odpychają, a różnoimienne przyciągają. Ciało naładowane dodatnio ma &lt;strong&gt;niedobór elektronów&lt;/strong&gt;, a ujemnie – &lt;strong&gt;nadmiar elektronów&lt;/strong&gt;.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;box&quot;&gt;
          &lt;h3&gt;Intuicja&lt;/h3&gt;
          &lt;p&gt;Myśl o elektronach jak o „nadmiarze” ruchliwych cząstek. Gdy ciało je traci, zostaje z przewagą ładunku dodatniego.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;

      q: &quot;Pojemność kondensatora opisuje wzór:&quot;,
      answers: [&quot;C = U/Q&quot;, &quot;C = Q/U&quot;, &quot;C = U·Q&quot;],
      correct: 1,
      exp: &quot;To definicja pojemności.&quot;
    }
  },
  {
    title: &quot;9. Energia kondensatora&quot;,
    tag: &quot;wzory i sens&quot;,
    body: `
      &lt;p&gt;Energia zgromadzona w kondensatorze zależy od pojemności i napięcia:&lt;/p&gt;
      &lt;div class=&quot;box center&quot;&gt;&lt;strong&gt;E = ½ · C · U²&lt;/strong&gt;&lt;/div&gt;
      &lt;p&gt;To bardzo ważny wzór, bo pokazuje, że energia rośnie z &lt;strong&gt;kwadratem napięcia&lt;/strong&gt;.&lt;/p&gt;
      &lt;div class=&quot;columns&quot;&gt;
        &lt;div class=&quot;box&quot;&gt;
          &lt;h3&gt;Wniosek&lt;/h3&gt;
          &lt;p&gt;Jeśli napięcie wzrośnie 2 razy, energia wzrośnie 4 razy.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;box&quot;&gt;
          &lt;h3&gt;Zastosowanie&lt;/h3&gt;
          &lt;p&gt;Dlatego kondensatory są używane tam, gdzie trzeba szybko zgromadzić i oddać energię, np. w lampie błyskowej.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;rev9&#x27;)&quot;&gt;Pokaż analogię&lt;/button&gt;
        &lt;div id=&quot;rev9&quot; class=&quot;reveal-content&quot;&gt;Możesz myśleć o kondensatorze jak o napiętej sprężynie: im bardziej ją „napniesz”, tym więcej energii przechowuje.&lt;/div&gt;
      &lt;/div&gt;
    `,
    quiz: {
      q: &quot;Energia kondensatora zależy od napięcia:&quot;,
      answers: [&quot;liniowo&quot;, &quot;odwrotnie proporcjonalnie&quot;, &quot;z kwadratem napięcia&quot;],
      correct: 2,
      exp: &quot;Wynika to wprost ze wzoru E = ½·C·U².&quot;
    }
  },
  {
    title: &quot;10. Podsumowanie i przejście do quizu&quot;,
    tag: &quot;zamknięcie działu&quot;,
    body: `
      &lt;p&gt;Masz już cały logiczny ciąg:&lt;/p&gt;
      &lt;div class=&quot;box&quot;&gt;
        &lt;strong&gt;ładunek → siła Coulomba → pole elektryczne → natężenie → potencjał i napięcie → przewodniki i dielektryki → kondensator → energia kondensatora&lt;/strong&gt;
      &lt;/div&gt;
      &lt;p&gt;To właśnie szkielet całego działu. Jeśli to rozumiesz, łatwiej rozwiązujesz i zadania definicyjne, i obliczeniowe.&lt;/p&gt;
      &lt;div class=&quot;columns&quot;&gt;
        &lt;div class=&quot;box&quot;&gt;
          &lt;h3&gt;Co warto umieć na pamięć?&lt;/h3&gt;
          &lt;p&gt;F = k·|q₁q₂|/r², E = F/q, E = U/d, C = Q/U, E = ½·C·U².&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;box&quot;&gt;
          &lt;h3&gt;Co warto rozumieć?&lt;/h3&gt;
          &lt;p&gt;Znaczenie pola, sens napięcia, dlaczego w przewodniku pole wewnątrz znika i jak kondensator magazynuje energię.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    `,
    quiz: {
      q: &quot;Która kolejność najlepiej oddaje logiczny ciąg działu?&quot;,

        &quot;ładunek → pole → napięcie → kondensator&quot;,

      ],
      correct: 1,

const state = {
  current: 0,
  passed: new Set()
};

const modulesContainer = document.getElementById(&#x27;modules&#x27;);
const currentModuleEl = document.getElementById(&#x27;currentModule&#x27;);
const passedCountEl = document.getElementById(&#x27;passedCount&#x27;);
const coursePercentEl = document.getElementById(&#x27;coursePercent&#x27;);
const progressBarEl = document.getElementById(&#x27;progressBar&#x27;);
const practiceSection = document.getElementById(&#x27;practiceSection&#x27;);
const summarySection = document.getElementById(&#x27;summarySection&#x27;);
const summaryText = document.getElementById(&#x27;summaryText&#x27;);

function goToPracticeTab(){
  if(window.parent &amp;&amp; typeof window.parent.showPanel === &#x27;function&#x27;){
    window.parent.showPanel(&#x27;practice&#x27;);
  } else {
    showPractice();
  }
}

function scrollToCurrentModuleTop(){
  const el = document.getElementById(`module-${state.current}`);
  if(el) el.scrollIntoView({behavior:&#x27;smooth&#x27;, block:&#x27;start&#x27;});
}


function moduleTemplate(mod, index){
  const answersHtml = mod.quiz.answers.map((ans, i) =&gt;
    `&lt;button class=&quot;answer&quot; data-module=&quot;${index}&quot; data-index=&quot;${i}&quot; onclick=&quot;answerMiniQuiz(${index}, ${i}, this)&quot;&gt;${ans}&lt;/button&gt;`
  ).join(&#x27;&#x27;);

  return `
    &lt;section class=&quot;card module ${index === 0 ? &#x27;active&#x27; : &#x27;&#x27;}&quot; id=&quot;module-${index}&quot;&gt;
      &lt;div class=&quot;module-head&quot;&gt;
        &lt;h2&gt;${mod.title}&lt;/h2&gt;
        &lt;span class=&quot;badge&quot;&gt;${mod.tag}&lt;/span&gt;
      &lt;/div&gt;
      ${mod.body}
      &lt;div class=&quot;mini-quiz&quot;&gt;
        &lt;h3&gt;Mini-pytanie kontrolne&lt;/h3&gt;
        &lt;p&gt;${mod.quiz.q}&lt;/p&gt;
        ${answersHtml}
        &lt;div class=&quot;feedback&quot; id=&quot;feedback-${index}&quot;&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;nav&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;prevModule()&quot;&gt;Poprzedni&lt;/button&gt;
        &lt;div class=&quot;inline-actions&quot;&gt;
          &lt;button class=&quot;secondary&quot; onclick=&quot;showPractice()&quot;&gt;Zadania krok po kroku&lt;/button&gt;
          &lt;button class=&quot;primary&quot; onclick=&quot;nextModule()&quot;&gt;Następny&lt;/button&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;
  `;
}

modulesContainer.innerHTML = modulesData.map(moduleTemplate).join(&#x27;&#x27;);

function updateHeader(){
  currentModuleEl.textContent = state.current + 1;
  passedCountEl.textContent = state.passed.size;
  const percent = Math.round(((state.current + 1) / modulesData.length) * 100);
  coursePercentEl.textContent = percent + &quot;%&quot;;
  progressBarEl.style.width = percent + &quot;%&quot;;
}

function showOnlyCurrent(){
  document.querySelectorAll(&#x27;.module&#x27;).forEach((m, idx) =&gt; {
    m.classList.toggle(&#x27;active&#x27;, idx === state.current);
  });
  updateHeader();
  hidePractice();
  summarySection.classList.remove(&#x27;show&#x27;);
  requestAnimationFrame(() =&gt; {
    const el = document.getElementById(`module-${state.current}`);
    if(el) el.scrollIntoView({behavior:&#x27;smooth&#x27;, block:&#x27;start&#x27;});
  });
}

function goToModule(index){
  state.current = Math.max(0, Math.min(modulesData.length - 1, index));
  showOnlyCurrent();
}

function nextModule(){
  if(state.current &lt; modulesData.length - 1){
    state.current++;
    showOnlyCurrent();
  } else {
    showSummary();
  }
}

function prevModule(){
  if(state.current &gt; 0){
    state.current--;
    showOnlyCurrent();
  }
}

function toggleReveal(id){
  document.getElementById(id).classList.toggle(&#x27;show&#x27;);
}

function answerMiniQuiz(moduleIndex, answerIndex, btn){
  const module = modulesData[moduleIndex];
  const feedback = document.getElementById(`feedback-${moduleIndex}`);
  const section = document.getElementById(`module-${moduleIndex}`);
  const buttons = section.querySelectorAll(&#x27;.answer&#x27;);
  buttons.forEach(b =&gt; b.disabled = true);

  if(answerIndex === module.quiz.correct){
    btn.classList.add(&#x27;correct&#x27;);
    state.passed.add(moduleIndex);
    feedback.innerHTML = `&lt;strong&gt;Dobrze.&lt;/strong&gt; ${module.quiz.exp}`;
  } else {
    btn.classList.add(&#x27;wrong&#x27;);
    buttons[module.quiz.correct].classList.add(&#x27;reveal-correct&#x27;);
    feedback.innerHTML = `&lt;strong&gt;Nie tym razem.&lt;/strong&gt; ${module.quiz.exp}`;
  }
  feedback.classList.add(&#x27;show&#x27;);
  updateHeader();
}

function showPractice(){
  practiceSection.classList.add(&#x27;show&#x27;);
  summarySection.classList.remove(&#x27;show&#x27;);
  practiceSection.scrollIntoView({behavior:&#x27;smooth&#x27;, block:&#x27;start&#x27;});
}

function hidePractice(){
  practiceSection.classList.remove(&#x27;show&#x27;);
}

function showSummary(){
  const passed = state.passed.size;
  summaryText.innerHTML = `Zaliczone mini-quizy: &lt;strong&gt;${passed} z ${modulesData.length}&lt;/strong&gt;. ${
    passed === modulesData.length
      ? &quot;Świetnie — masz opanowany cały logiczny ciąg tego działu.&quot;
      : &quot;Masz już dużą część materiału. Warto wrócić do modułów, w których mini-quiz nie został jeszcze zaliczony.&quot;
  }`;
  summarySection.classList.add(&#x27;show&#x27;);
  summarySection.scrollIntoView({behavior:&#x27;smooth&#x27;, block:&#x27;start&#x27;});
}

document.getElementById(&#x27;startCourseBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; goToModule(0));
updateHeader();

&lt;title&gt;Zadania&lt;/title&gt;&lt;style&gt;
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1f2937;

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;

h1,h2,h3{margin-top:0}

.controls,.nav,.inline-actions{

  display:flex;

.answer.wrong{background:var(--bad-bg);border-color:#fca5a5;color:var(--bad);font-weight:700}

&lt;body&gt;&lt;div class=&quot;wrap&quot;&gt;&lt;section class=&quot;card practice show&quot; id=&quot;practiceSection&quot;&gt;
    &lt;h2&gt;Zadania obliczeniowe krok po kroku&lt;/h2&gt;
    &lt;p class=&quot;muted&quot;&gt;Tutaj przechodzisz przez typowe zadania z tego działu. Każdy przykład ma rozwijane etapy rozwiązania.&lt;/p&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 1. Prawo Coulomba&lt;/h3&gt;
      &lt;p&gt;Dwa ładunki: &lt;strong&gt;q₁ = 2 μC&lt;/strong&gt; i &lt;strong&gt;q₂ = 3 μC&lt;/strong&gt; znajdują się w odległości &lt;strong&gt;r = 0,20 m&lt;/strong&gt;. Oblicz wartość siły oddziaływania.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Zapisz wzór: &lt;strong&gt;F = k·|q₁q₂|/r²&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień mikroculomby: 2 μC = 2·10⁻⁶ C, 3 μC = 3·10⁻⁶ C.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; Podstaw: F = 9·10⁹ · (2·10⁻⁶ · 3·10⁻⁶) / (0,20)².&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol1&#x27;)&quot;&gt;Pokaż wynik i komentarz&lt;/button&gt;
        &lt;div id=&quot;sol1&quot; class=&quot;reveal-content&quot;&gt;
          Po obliczeniu wychodzi &lt;strong&gt;F = 1,35 N&lt;/strong&gt;. Najczęstszy błąd to brak zamiany μC na C albo zapomnienie o kwadracie odległości.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 2. Natężenie pola&lt;/h3&gt;
      &lt;p&gt;Na ładunek &lt;strong&gt;q = 5 nC&lt;/strong&gt; działa w polu siła &lt;strong&gt;F = 2·10⁻⁴ N&lt;/strong&gt;. Oblicz natężenie pola.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Użyj zależności &lt;strong&gt;E = F/q&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień 5 nC = 5·10⁻⁹ C.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; E = 2·10⁻⁴ / 5·10⁻⁹ = 4·10⁴ N/C.&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol2&#x27;)&quot;&gt;Pokaż interpretację&lt;/button&gt;
        &lt;div id=&quot;sol2&quot; class=&quot;reveal-content&quot;&gt;
          Otrzymujesz &lt;strong&gt;40 000 N/C&lt;/strong&gt;. To oznacza, że na ładunek 1 C w tym punkcie działałaby siła 40 000 N.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 3. Pole jednorodne&lt;/h3&gt;
      &lt;p&gt;Między płytami kondensatora jest napięcie &lt;strong&gt;U = 120 V&lt;/strong&gt;, a odległość między okładkami wynosi &lt;strong&gt;d = 6 mm&lt;/strong&gt;. Oblicz natężenie pola.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Wzór: &lt;strong&gt;E = U/d&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień 6 mm = 0,006 m.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; E = 120 / 0,006 = 20 000 V/m.&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;
        &lt;button class=&quot;secondary&quot; onclick=&quot;toggleReveal(&#x27;sol3&#x27;)&quot;&gt;Pokaż uwagę egzaminacyjną&lt;/button&gt;
        &lt;div id=&quot;sol3&quot; class=&quot;reveal-content&quot;&gt;
          W polu jednorodnym między okładkami kondensatora natężenie ma tę samą wartość w całej przestrzeni między płytami.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;box&quot;&gt;
      &lt;h3&gt;Zadanie 4. Pojemność kondensatora&lt;/h3&gt;
      &lt;p&gt;Kondensator zgromadził ładunek &lt;strong&gt;Q = 8 μC&lt;/strong&gt; przy napięciu &lt;strong&gt;U = 4 V&lt;/strong&gt;. Oblicz jego pojemność.&lt;/p&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 1:&lt;/strong&gt; Skorzystaj ze wzoru &lt;strong&gt;C = Q/U&lt;/strong&gt;.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 2:&lt;/strong&gt; Zamień 8 μC = 8·10⁻⁶ C.&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;strong&gt;Krok 3:&lt;/strong&gt; C = 8·10⁻⁶ / 4 = 2·10⁻⁶ F.&lt;/div&gt;
      &lt;div class=&quot;reveal&quot;&gt;

        [copy[i], copy[j]] = [copy[j], copy[i]];
