<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#335dff">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.svg" type="image/svg+xml">
<title>Elektrostatyka – PWA</title>
<style>
  :root {
    --bg:#f4f7fb;
    --card:#ffffff;
    --text:#1f2937;
    --muted:#667085;
    --accent:#335dff;
    --border:#d9e1f2;
  }
  * { box-sizing:border-box; }
  html, body {
    margin:0; padding:0; height:100%;
    background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 100%);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
  }
  .app { min-height:100dvh; display:flex; flex-direction:column; }
  .topbar {
    position:sticky; top:0; z-index:10;
    background:rgba(244,247,251,.96);
    backdrop-filter: blur(8px);
    border-bottom:1px solid var(--border);
    padding:12px;
  }
  .title { font-size:1.05rem; font-weight:700; margin:0 0 8px; }
  .tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .tab-btn {
    border:none; border-radius:14px; padding:12px 10px; font-size:.95rem; font-weight:700;
    background:#eef2ff; color:#335dff;
  }
  .tab-btn.active { background:#335dff; color:#fff; }
  .panel { display:none; flex:1; min-height:0; }
  .panel.active { display:block; }
  iframe {
    width:100%; height:calc(100dvh - 96px); border:none; display:block; background:#fff;
  }
  .hint {
    color:var(--muted); font-size:.92rem; margin-top:8px; line-height:1.4;
  }
  .install {
    display:none;
    margin-top:10px;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    background:#335dff;
    color:#fff;
    font-weight:700;
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <p class="title">Elektrostatyka – aplikacja offline</p>
    <div class="tabs">
      <button class="tab-btn active" id="btnCourse" onclick="showPanel('course')">Kurs</button>
      <button class="tab-btn" id="btnPractice" onclick="showPanel('practice')">Zadania</button>
      <button class="tab-btn" id="btnQuiz" onclick="showPanel('quiz')">Quiz</button>
    </div>
    <div class="hint">Pakiet zawiera interaktywny kurs, zadania krok po kroku i quiz. Po zainstalowaniu działa offline jak aplikacja.</div>
    <button id="installBtn" class="install">Zainstaluj aplikację</button>
  </div>

  <section class="panel active" id="panelCourse">
    <iframe title="Kurs" src="./course.html"></iframe>
  </section>
  <section class="panel" id="panelPractice">
    <iframe title="Zadania" src="./practice.html"></iframe>
  </section>
  <section class="panel" id="panelQuiz">
    <iframe title="Quiz" src="./quiz.html"></iframe>
  </section>
</div>

<script>
function showPanel(which) {
  const ids = ['course','practice','quiz'];
  ids.forEach(id => {
    document.getElementById('panel' + id.charAt(0).toUpperCase() + id.slice(1)).classList.toggle('active', id === which);
    document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.toggle('active', id === which);
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}

let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'inline-block';
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = 'none';
});
</script>
</body>
</html>
